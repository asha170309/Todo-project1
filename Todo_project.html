<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>do it.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c8f135;
    --text: #f0ede6;
    --muted: #555;
    --done: #333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 40px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 14vw, 120px);
    color: var(--accent);
    line-height: 0.9;
    letter-spacing: -2px;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 10px;
  }

  .input-row {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--accent); }

  button.add-btn {
    background: var(--accent);
    border: none;
    color: #0e0e0e;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    padding: 0 24px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  button.add-btn:hover { opacity: 0.85; }
  button.add-btn:active { transform: scale(0.97); }

  .filters {
    width: 100%;
    max-width: 560px;
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color 0.2s, opacity 0.2s;
    animation: slideIn 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .todo-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .todo-item:hover::before { transform: scaleY(1); }
  .todo-item:hover { border-color: #3a3a3a; }

  .todo-item.done {
    opacity: 0.4;
    border-color: var(--done);
  }

  .todo-item.done::before { display: none; }

  .check {
    width: 20px;
    height: 20px;
    border: 1px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
  }

  .check:hover { border-color: var(--accent); }

  .todo-item.done .check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .todo-item.done .check::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0e0e0e;
    font-size: 12px;
    font-weight: bold;
  }

  .todo-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    transition: text-decoration 0.2s;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
    padding: 2px 6px;
  }

  .todo-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: #ff4444; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 40px 0;
  }

  .footer {
    width: 100%;
    max-width: 560px;
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.15s;
    padding: 0;
  }

  .clear-btn:hover { color: #ff4444; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(20px); height: 0; padding: 0; margin: 0; border: none; }
  }

  .removing { animation: fadeOut 0.25s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="title">do it.</div>
  <div class="subtitle">your tasks, stripped down</div>
</header>

<div class="input-row">
  <input type="text" id="taskInput" placeholder="what needs doing..." maxlength="120">
  <button class="add-btn" onclick="addTask()">ADD</button>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
</div>

<div class="list" id="list"></div>

<div class="footer">
  <span id="count">0 tasks left</span>
  <button class="clear-btn" onclick="clearDone()">clear completed</button>
</div>

<script>
  let tasks = [];
  let filter = 'all';
  let nextId = 0;

  const input = document.getElementById('taskInput');
  const list = document.getElementById('list');
  const countEl = document.getElementById('count');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  function addTask() {
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ id: nextId++, text, done: false });
    input.value = '';
    render();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    render();
  }

  function remove(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        render();
      }, 240);
    }
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const visible = tasks.filter(t =>
      filter === 'all' ? true :
      filter === 'done' ? t.done : !t.done
    );

    const active = tasks.filter(t => !t.done).length;
    countEl.textContent = `${active} task${active !== 1 ? 's' : ''} left`;

    if (visible.length === 0) {
      list.innerHTML = `<div class="empty">${
        filter === 'done' ? 'nothing done yet' :
        filter === 'active' ? 'all clear ✓' :
        'add something above'
      }</div>`;
      return;
    }

    list.innerHTML = visible.map(t => `
      <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
        <div class="check" onclick="toggle(${t.id})"></div>
        <span class="todo-text">${escapeHtml(t.text)}</span>
        <button class="del-btn" onclick="remove(${t.id})">×</button>
      </div>
    `).join('');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
